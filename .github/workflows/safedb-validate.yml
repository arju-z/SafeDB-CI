# .github/workflows/safedb-validate.yml
#
# PURPOSE:
# This is the canonical example workflow for consumers using the SafeDB-CI
# GitHub Action. It demonstrates:
#   - Using a Postgres service container as the ephemeral validation DB.
#   - Using a MySQL service container as the ephemeral validation DB.
#   - Injecting credentials securely from GitHub Secrets.
#   - Enabling strict mode for production-branch migrations.
#   - Pinning the action to a semantically versioned release.
#
# CRITICAL DESIGN CONSTRAINT:
# The service container MUST have a health check configured.
# WHY: GitHub Actions does not wait for a service to be fully ready before
# starting steps. Without a health check, the 'Run SafeDB-CI' step may
# start before Postgres has finished initializing and will get connection
# refused errors that look like migration failures.

name: SafeDB-CI Migration Validation

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1: Validate against PostgreSQL
  # ---------------------------------------------------------------------------
  validate-postgres:
    name: "Validate Migrations (PostgreSQL)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        # WHY HARDCODE THESE HERE (not from secrets):
        # Service containers cannot access GitHub Secrets in the `env:` block
        # under `services:`. These credentials are for an ephemeral, isolated
        # CI database with no public exposure — not a production system.
        # The ACTUAL authentication risk is production credentials, which we
        # never expose here.
        env:
          POSTGRES_USER: safedb
          POSTGRES_PASSWORD: safedbpass
          POSTGRES_DB: safedb_test
        ports:
          - 5432:5432
        # WHY HEALTH CHECK: Ensures Postgres is fully ready to accept
        # connections before the action step begins execution.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # pin to a specific major version tag (e.g. @v1) for stability.
      # Never use @main directly in production — that is a floating reference
      # that may introduce breaking changes without notice.
      - name: Run SafeDB-CI (PostgreSQL, strict)
        uses: your-org/SafeDB-CI@v1
        with:
          db_type: postgres
          migrations_path: ./migrations
          strict_mode: "true"   # Fail on MEDIUM anomalies on main branch
          postgres_user: safedb
          postgres_password: safedbpass
          postgres_db: safedb_test

  # ---------------------------------------------------------------------------
  # JOB 2: Validate against MySQL
  # ---------------------------------------------------------------------------
  validate-mysql:
    name: "Validate Migrations (MySQL)"
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_USER: safedb
          MYSQL_PASSWORD: safedbpass
          MYSQL_DATABASE: safedb_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u safedb -psafedbpass"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run SafeDB-CI (MySQL, strict)
        uses: your-org/SafeDB-CI@v1
        with:
          db_type: mysql
          migrations_path: ./migrations
          strict_mode: "true"
          mysql_user: safedb
          mysql_password: safedbpass
          mysql_database: safedb_test

  # ---------------------------------------------------------------------------
  # JOB 3: Non-strict validation for feature branches
  # WHY: Development branches allow MEDIUM anomalies as warnings.
  # Only the main branch enforces strict mode.
  # ---------------------------------------------------------------------------
  validate-dev:
    name: "Validate Migrations (Dev, warn-only)"
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: safedb
          POSTGRES_PASSWORD: safedbpass
          POSTGRES_DB: safedb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run SafeDB-CI (warn-only)
        uses: your-org/SafeDB-CI@v1
        with:
          db_type: postgres
          migrations_path: ./migrations
          strict_mode: "false"   # Structural warnings do NOT fail PR checks
          postgres_user: safedb
          postgres_password: safedbpass
          postgres_db: safedb_test
