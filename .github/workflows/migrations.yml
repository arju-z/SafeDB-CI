name: SafeDB-CI Migration Validation

on:
  push:
    branches:
      - main
      - "release/**"
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:

  # ---------------------------------------------------------------------------
  # Validate against PostgreSQL (strict on main, warn-only on feature branches)
  # ---------------------------------------------------------------------------
  validate-postgres:
    name: "Validate Migrations (PostgreSQL)"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: safedb
          POSTGRES_PASSWORD: safedbpass
          POSTGRES_DB: safedb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run SafeDB-CI
        uses: ./ 
        with:
          db_type: postgres
          migrations_path: ./examples/03_schema_integrity_fail
          strict_mode: ${{ github.ref == 'refs/heads/main' && 'true' || 'false' }}
          postgres_user: safedb
          postgres_password: safedbpass
          postgres_db: safedb_test