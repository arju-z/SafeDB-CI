name: 'Hello World'
description: 'Greet someone and record time'

inputs:
  what-to-greet:
    description: 'What to greet'
    required: true
    default: 'World'

outputs:
  time:
    description: 'Time greeted you'

runs:
  using: 'docker'
  image: 'Dockerfile'

  args:
    - ${{ inputs.who-to-greet }}
