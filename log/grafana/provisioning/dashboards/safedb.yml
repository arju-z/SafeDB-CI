# log/grafana/provisioning/dashboards/safedb.yml
#
# Tells Grafana where to find pre-built dashboards to load on startup.

apiVersion: 1

providers:
  - name: SafeDB-CI Dashboards
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
