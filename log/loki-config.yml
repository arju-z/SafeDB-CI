# log/loki-config.yml
#
# Loki configuration for SafeDB-CI log ingestion.
#
# WHY FILESYSTEM STORAGE: No S3 or object store dependency required.
# All data is persisted to the `loki_data` docker volume. For production,
# replace the storage backend with S3 or GCS.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

# Increase limits to handle CI bursts (many pushes in parallel).
limits_config:
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  # Reject logs older than 24h to avoid clock skew issues in CI.
  reject_old_samples: true
  reject_old_samples_max_age: 24h
